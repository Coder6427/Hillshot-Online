<style>
:root{color-scheme:dark;--ink:#f8f2df;--muted:#b7c5cf;--panel:rgba(14,22,34,.86);--line:rgba(255,255,255,.16);--gold:#ffc85b;--blue:#58a6ff;--green:#21d07a;--red:#ff6759}*{box-sizing:border-box}body{margin:0;overflow:hidden;background:#101827;color:var(--ink);font-family:Inter,system-ui,Segoe UI,sans-serif}#game{display:block;width:100vw;height:100vh}.hud{position:fixed;inset:14px 14px auto 14px;display:flex;justify-content:space-between;gap:12px;pointer-events:none}.panel{border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(12px);border-radius:8px;box-shadow:0 18px 45px #0006;padding:10px 12px}.teams{display:flex;gap:8px;flex-wrap:wrap}.team{border-left:4px solid var(--c);min-width:130px}.small{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase}.big{font-size:18px;font-weight:900}.turn{text-align:center;min-width:270px}.bar{height:9px;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#ffffff18;margin-top:5px}.fill{height:100%;background:var(--gold)}.msg{position:fixed;left:50%;top:112px;transform:translateX(-50%);opacity:0;transition:.2s;z-index:6;text-align:center;font-weight:900;min-width:min(430px,calc(100vw - 30px))}.msg.show{opacity:1;transform:translateX(-50%) translateY(7px)}.weapons{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);display:flex;gap:8px;z-index:4;max-width:calc(100vw - 20px);overflow:auto}.weapon{width:94px;min-height:52px;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;display:grid;grid-template-columns:24px 1fr;align-items:center;gap:7px;padding:7px;cursor:pointer}.weapon.active{outline:2px solid var(--gold)}.key{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;background:#e9f0dd;color:#111;font-weight:900}.dot{width:11px;height:11px;border-radius:50%;display:inline-block;background:var(--w);margin-right:4px}.menu{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;padding:18px;background:radial-gradient(circle at 50% 42%,#63a7ff 0 10%,transparent 32%),linear-gradient(135deg,#10254e,#5aa7f0 52%,#16233b)}.menu.hide{display:none}.lobby{position:relative;width:min(1040px,100%);min-height:min(650px,calc(100vh - 36px));border:1px solid #ffffff22;border-radius:8px;background:linear-gradient(135deg,#12213bcc,#2d78c9aa);box-shadow:0 28px 90px #0008;overflow:hidden;padding:22px}.tiles{position:absolute;inset:-80px;background:repeating-linear-gradient(45deg,#ffffff14 0 28px,#0000 28px 78px);transform:rotate(-12deg);opacity:.45}.top{position:relative;display:flex;justify-content:space-between;align-items:center}.logo{font-size:42px;font-weight:1000;letter-spacing:0}.status{color:#ff7b74;font-weight:900}.avatar{position:absolute;left:50%;top:50%;transform:translate(-50%,-43%);width:150px;height:310px}.head{position:absolute;left:52px;top:20px;width:48px;height:54px;border-radius:50% 50% 44% 44%;background:#f0d3a4;border:3px solid #203246}.hair{position:absolute;left:46px;top:12px;width:58px;height:26px;background:#483223;border-radius:18px}.body{position:absolute;left:39px;top:76px;width:72px;height:95px;background:linear-gradient(135deg,#f7f4db 0 28%,#62d3f6 28% 70%,#ffffff 70%);clip-path:polygon(18% 0,82% 0,100% 100%,0 100%)}.arm,.leg{position:absolute;background:#f0d3a4;border-radius:12px}.arm.l{left:19px;top:83px;width:18px;height:105px;transform:rotate(10deg)}.arm.r{right:19px;top:83px;width:18px;height:105px;transform:rotate(-10deg)}.leg.l{left:48px;top:165px;width:22px;height:96px;background:#3a485a}.leg.r{right:48px;top:165px;width:22px;height:96px;background:#3a485a}.shoe{position:absolute;top:254px;width:34px;height:15px;background:#5ab0ff;border-radius:10px}.shoe.l{left:38px}.shoe.r{right:38px}.base{position:absolute;left:20px;bottom:0;width:110px;height:28px;border-radius:50%;background:#dfe8f5;border:5px solid #98a6bb}.side{position:absolute;right:22px;top:46%;transform:translateY(-40%);width:min(280px,40vw);display:grid;gap:10px}.leftCard{position:absolute;left:22px;top:105px;width:250px;min-height:125px;background:#10223ccc;border:1px solid #ffffff24;border-radius:8px;padding:12px}.choice{position:relative;border:1px solid #ffffff22;border-radius:8px;background:#10243fcc;color:var(--ink);padding:14px;min-height:62px;text-align:left;font-weight:900;font-size:18px}.choice.primary{background:#ffc85b;color:#201409}.choice.green{background:#16d17b;color:#07180f}.choice.blue{background:#2797ff}.choice small{display:block;color:inherit;opacity:.76;font-size:12px;margin-top:2px}.step{display:none;position:relative;z-index:2}.step.show{display:block}input,select{width:100%;border:1px solid var(--line);border-radius:8px;background:#111b2a;color:var(--ink);font:inherit;font-weight:800;padding:11px;margin-top:8px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:20;background:#0008}.overlay.show{display:flex}.modal{width:min(430px,calc(100vw - 28px));text-align:center}@media(max-width:760px){.avatar{opacity:.32}.side{position:relative;right:auto;top:auto;transform:none;width:100%;margin-top:260px}.leftCard{display:none}.hud{display:block}.turn{margin-top:8px}.weapon{width:84px}.row{grid-template-columns:1fr}}
.menu{background:radial-gradient(circle at 50% 42%,#78c7ff 0 12%,transparent 31%),linear-gradient(135deg,#09142f,#2f78d8 48%,#132445)}
.lobby{background:linear-gradient(135deg,#12213be8,#2f7fd8cc);border:2px solid #ffffff2e;min-height:min(690px,calc(100vh - 36px))}
.tiles{opacity:.62;background:repeating-linear-gradient(45deg,#ffffff18 0 30px,#0000 30px 78px),repeating-linear-gradient(-45deg,#0000001d 0 22px,#0000 22px 70px)}
.avatar{position:absolute;left:50%;top:50%;transform:translate(-50%,-38%);width:190px;height:190px;border-radius:50%;background:radial-gradient(circle at 36% 30%,#fff7d8 0 12%,#6ee7ff 13% 34%,#4ba3ff 35% 68%,#1c477f 69%);border:7px solid #e7f7ff;box-shadow:0 0 0 12px #1d365aaa,0 30px 80px #001a4caa, inset -18px -22px 0 #0000001e}
.avatar>*{display:none}.avatar:before{content:'';position:absolute;left:48px;top:61px;width:18px;height:18px;border-radius:50%;background:#101827;box-shadow:76px 0 0 #101827}.avatar:after{content:'';position:absolute;left:57px;top:105px;width:76px;height:24px;border:5px solid #101827;border-top:0;border-radius:0 0 60px 60px}.base{display:block!important;left:26px!important;bottom:-47px!important;width:138px!important;height:34px!important;border-radius:50%!important;background:#dfe8f5!important;border:6px solid #8294ad!important}.side{right:32px;top:52%;width:min(330px,42vw);gap:18px}.step.show{display:grid;gap:14px}.choice{width:100%;min-height:72px;border-radius:10px;padding:17px 18px;font-size:20px;text-align:left;box-shadow:0 10px 24px #001a3f55}.choice.primary{font-size:32px;text-align:center;letter-spacing:0;background:linear-gradient(#ffd875,#ffb83d);border-color:#fff2b7}.choice.green{background:linear-gradient(#27e58a,#10bd68)}.choice.blue{background:linear-gradient(#35a8ff,#1676e8)}.choice small{font-size:13px;text-transform:none}.leftCard{top:118px;width:275px;background:#10284dcc}.status{color:#ffdd65}.logo{text-shadow:0 5px 24px #001b4f}.playbig{min-height:92px}.hintLine{position:absolute;left:22px;bottom:28px;color:#dbeaff;font-weight:800;background:#10284dcc;border:1px solid #ffffff22;border-radius:8px;padding:10px 12px}@media(max-width:760px){.avatar{top:38%;opacity:.55}.side{margin-top:250px;right:auto;width:100%}.choice.primary{font-size:28px}.hintLine{display:none}}
.top{justify-content:flex-start;gap:22px}.top>.choice{width:auto;min-height:0;padding:13px 24px;text-align:center;font-size:20px;background:linear-gradient(#9ef6ff,#39c8ff);color:#071522;border:2px solid #eaffff;box-shadow:0 0 0 3px #ffffff30,0 14px 32px #10c8ff66}.choice,.weapon,.resign{transition:transform .18s cubic-bezier(.2,.9,.2,1),filter .18s,box-shadow .18s;cursor:pointer}.choice:active,.weapon:active,.resign:active{transform:scale(.94)}@keyframes buttonPop{0%{transform:scale(1)}42%{transform:scale(.93)}72%{transform:scale(1.04)}100%{transform:scale(1)}}.bump{animation:buttonPop .28s cubic-bezier(.2,.9,.2,1)}.choice.selected{outline:3px solid #fff7cf;box-shadow:0 0 0 5px #ffd86b44,0 16px 34px #001a3f70}.step{display:grid!important;gap:14px;max-height:0;opacity:0;overflow:hidden;pointer-events:none;transform:translateY(-18px) scale(.98);transition:max-height .38s cubic-bezier(.18,.88,.22,1),opacity .22s ease,transform .38s cubic-bezier(.18,.88,.22,1)}.step.show{max-height:620px;opacity:1;pointer-events:auto;transform:translateY(0) scale(1)}.resign{position:fixed;right:16px;top:94px;z-index:5;display:none;align-items:center;gap:10px;border:2px solid #ffffffaa;border-radius:8px;background:#f8fbff;color:#13223b;font-weight:1000;padding:11px 14px;box-shadow:0 18px 42px #0007}.resign.show{display:flex}.resign:before{content:'';width:18px;height:13px;background:#fff;border:2px solid #13223b;box-shadow:-5px 7px 0 -3px #13223b}.resign:after{content:'';width:3px;height:25px;background:#13223b;margin-left:-28px;margin-right:12px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud"><div class="teams" id="teams"></div><div class="panel turn"><div id="turnText" class="big">Hillshot</div><div class="small" id="windText">Wind 0</div><div class="bar"><div class="fill" id="powerFill"></div></div></div></div>
<div class="panel msg" id="message"></div><div class="weapons" id="weapons"></div><button class="resign" id="resignBtn" title="Resign">Resign</button>
<div class="menu" id="menu"><div class="lobby"><div class="tiles"></div><div class="top"><div><div class="logo">Hillshot</div><div class="small" id="regionText">Thailand-ready party links</div></div><button class="choice" id="settingsBtn">Map</button></div><div class="leftCard"><div class="small">Player</div><div class="big" id="playerName">Guest</div><div class="status" id="readyText">Not Ready</div></div><div class="avatar"><div class="base"></div></div><div class="hintLine">Move: A/D or Arrow Keys &nbsp; Aim: Drag &nbsp; Fire: Space</div><div class="side">
  <div class="step show" id="stepStart"><button class="choice primary playbig" id="soloBtn">PLAY<small>Guest Solo vs AI</small></button><button class="choice green" id="accountBtn">Make Account<small>Play Online With Friends</small></button><button class="choice blue" id="guestBtn">Play As Guest<small>Choose Party Or Solo</small></button></div>
  <div class="step" id="stepAccount"><div class="panel"><div class="big">Account Name</div><input id="nameInput" maxlength="18" placeholder="Type Here"><button class="choice green" id="finishName">Finish</button></div></div>
  <div class="step" id="stepParty"><button class="choice primary" id="guestSoloBtn">PLAY SOLO<small>Start Instantly As Guest</small></button><button class="choice green" id="makeParty">Make Party<small>Get A Code For Your Friend</small></button><button class="choice blue" id="joinParty">Join Party<small>Type Your Friend's Code</small></button><input id="joinCode" placeholder="Party Code"></div>
  <div class="step" id="stepMode"><div class="panel"><div class="small">Party Code</div><div class="big" id="partyCode">None</div><input id="inviteLink" readonly></div><button class="choice green" id="teamMode">Play As A Team<small>You And Your Friend vs AI</small></button><button class="choice primary" id="versusMode">Fight Each Other<small>Player vs Player</small></button><button class="choice primary playbig" id="playBtn">PLAY<small id="playHint">Start Team Match</small></button></div>
  <div class="step" id="stepSettings"><div class="panel"><div class="row"><div><div class="small">Map</div><select id="mapSelect"><option value="moon">Moon Crater</option><option value="day">Blue Day</option><option value="night">Night Blocks</option><option value="ember">Ember Valley</option></select></div><div><div class="small">AI hardness</div><input id="aiLevel" type="range" min="1" max="5" value="3"></div></div><button class="choice" id="backSettings">Back</button></div></div>
</div></div></div>
<div class="overlay" id="overlay"><div class="panel modal"><h1 id="winner">Game Over</h1><p id="winnerText"></p><button class="choice primary" id="againBtn">Play Again</button><button class="choice" id="menuBtn">Menu</button></div></div>
<div class="overlay" id="resignConfirm"><div class="panel modal"><h1>Are You Sure?</h1><p>This will end your match.</p><button class="choice primary" id="yesResign">White Flag</button><button class="choice" id="noResign">Keep Playing</button></div></div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),menu=document.getElementById('menu'),teamsEl=document.getElementById('teams'),turnText=document.getElementById('turnText'),windText=document.getElementById('windText'),powerFill=document.getElementById('powerFill'),message=document.getElementById('message'),weaponsEl=document.getElementById('weapons'),overlay=document.getElementById('overlay'),winner=document.getElementById('winner'),winnerText=document.getElementById('winnerText');
const $=id=>document.getElementById(id),world={w:1280,h:720},DPR=Math.min(devicePixelRatio||1,2);let scale=1,ox=0,oy=0,terrain=[],hard=[],items=[],teams=[],turn=0,active=[0,0,0,0],proj=null,parts=[],fires=[],wind=0,angle=-45,power=60,weapon='cannon',drag=false,game=false,aiTimer=null,msgTimer=null,lastAction=0,pollTimer=null,keys={left:false,right:false},lastT=0;
const state={name:localStorage.hillName||'',server:localStorage.hillServer||(location.protocol==='file:'?'http://127.0.0.1:8787':location.origin),party:'',members:[],mode:'team',map:'moon',ai:3,online:false,seed:Date.now()};const colors=[['Blue','#5fb7ff','#1f5a9a'],['Red','#ff6759','#9b2f2d'],['Green','#32d47c','#246b42'],['Gold','#ffc85b','#9c6a20']];const weaponList=[['1','cannon','Cannon','#f2ce64'],['2','lift','Lift','#74d7ff'],['3','fire','Fire','#ff7548'],['4','cluster','Cluster','#b8ff5a'],['5','drill','Drill','#d7c0ff']];let rng=Math.random;
function seed(s){let t=s||1;return()=>{t+=0x6D2B79F5;let r=Math.imul(t^t>>>15,1|t);r^=r+Math.imul(r^r>>>7,61|r);return((r^r>>>14)>>>0)/4294967296}}
function api(path,body){return fetch(state.server.replace(/\/$/,'')+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(async r=>{const j=await r.json();if(!r.ok)throw Error(j.error||'server');return j})}
function apiGet(path){return fetch(state.server.replace(/\/$/,'')+path).then(r=>r.json())}
function showStep(id){document.querySelectorAll('.step').forEach(x=>x.classList.remove('show'));$(id).classList.add('show')}function note(t,c='#fff7cf'){clearTimeout(msgTimer);message.textContent=t;message.style.color=c;message.classList.add('show');msgTimer=setTimeout(()=>message.classList.remove('show'),2200)}
function resize(){canvas.width=innerWidth*DPR;canvas.height=innerHeight*DPR;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(DPR,0,0,DPR,0,0);scale=Math.min(innerWidth/world.w,innerHeight/world.h);ox=(innerWidth-world.w*scale)/2;oy=(innerHeight-world.h*scale)/2}addEventListener('resize',resize);resize();
function terrainY(x){return terrain[Math.max(0,Math.min(world.w-1,Math.round(x)))]||world.h}function toWorld(e){return{x:(e.clientX-ox)/scale,y:(e.clientY-oy)/scale}}
function makeTerrain(){terrain=[];hard=[];for(let x=0;x<world.w;x++){let y=500;if(state.map==='moon')y=500+Math.sin(x*.006)*92+Math.sin(x*.032)*22+Math.cos(x*.017)*25;if(state.map==='day')y=505+Math.sin(x*.008)*55+Math.sin(x*.021+1.4)*42;if(state.map==='night')y=500+(Math.floor(x/92)%2?48:-30)+Math.sin(x*.018)*24;if(state.map==='ember')y=540-Math.exp(-Math.pow((x-640)/210,2))*160+Math.sin(x*.018)*38;terrain[x]=Math.max(275,Math.min(665,y));hard[x]=1+(state.map==='night'?1.1:0)+(Math.sin(x*.025)>0.78?1.2:0)}}
function makeItems(){items=[];for(let i=0;i<7;i++){let x=90+rng()*(world.w-180);items.push({x,y:terrainY(x)-16,vy:0,alive:true})}}
function setupTeams(){teams=[];let count=state.online?Math.max(2,Math.min(4,state.members.length||2)):2;if(state.mode==='team'&&state.online)count=2;for(let i=0;i<count;i++){let c=colors[i];let owner=state.online?(state.mode==='team'?(i===0?state.members.join(', '):'AI'):(state.members[i]||'AI')):(i===0?'You':'AI');teams.push({id:i,label:`Team ${i+1}: ${c[0]}`,color:c[1],dark:c[2],owner,type:owner==='AI'?'ai':'human',soldiers:[]})}let xs=[170,1110,390,890];teams.forEach((tm,i)=>{for(let n=0;n<2;n++){let x=xs[i]+(n-.5)*54+rng()*20;tm.soldiers.push({x,y:terrainY(x)-13,vx:0,vy:0,hp:100,alive:true,r:13,move:95,burn:-1})}})}
function startMatch(online=false,remote){state.online=online;if(!remote)state.seed=Date.now();rng=seed(state.seed);makeTerrain();makeItems();setupTeams();turn=0;active=teams.map(()=>0);proj=null;parts=[];fires=[];game=true;keys.left=keys.right=false;menu.classList.add('hide');overlay.classList.remove('show');$('resignConfirm').classList.remove('show');$('resignBtn').classList.add('show');wind=Math.round((rng()*2-1)*30)/10;updateHud();scheduleAI();if(online&&!remote)api('/api/game/start',{name:state.name,code:state.party,seed:state.seed,config:{mode:state.mode,map:state.map,ai:state.ai,members:state.members}}).catch(()=>note('Server Did Not Start Match','#ff9b80'))}
function living(){return teams.filter(t=>t.soldiers.some(s=>s.alive))}function soldier(){let s=teams[turn]?.soldiers[active[turn]%teams[turn].soldiers.length];if(!s?.alive){active[turn]=teams[turn].soldiers.findIndex(x=>x.alive);s=teams[turn].soldiers[active[turn]]}return s}function canPlay(){let t=teams[turn];if(!game||proj||!t||t.type==='ai')return false;if(!state.online)return true;if(state.mode==='team')return t.id===0&&state.members.includes(state.name);return t.owner===state.name}
function updateHud(){teamsEl.innerHTML=teams.map(t=>`<div class="panel team" style="--c:${t.color}"><div class="small">${t.label}</div><div class="big">${t.soldiers.reduce((a,s)=>a+Math.max(0,s.hp),0)} HP</div><div class="small">${t.owner}</div></div>`).join('');let t=teams[turn];turnText.textContent=t?`${t.label} ${canPlay()?'Your Turn':t.type==='ai'?'AI Thinking':'Waiting'}`:'Hillshot';windText.textContent=`Wind ${wind>0?'+':''}${wind}`;powerFill.style.width=power+'%'}
function processRemote(){if(state.online&&state.party)poll()}
function nextTurn(){fires.forEach(f=>{teams.forEach(t=>t.soldiers.forEach(s=>{if(s.alive&&t.id!==f.team&&Math.hypot(s.x-f.x,s.y-f.y)<f.r&&s.burn!==turn){s.hp-=14;s.burn=turn;if(s.hp<=0)s.alive=false}}));f.life--});fires=fires.filter(f=>f.life>0);if(living().length<=1){game=false;$('resignBtn').classList.remove('show');let win=living()[0];winner.textContent=win?`${win.label} Wins`:'Game Over';winnerText.textContent=win&&win.type==='ai'?'Game Over - You Lost':'Nice Shot.';overlay.classList.add('show');return}active[turn]++;let tries=0;do{turn=(turn+1)%teams.length;tries++}while(!teams[turn].soldiers.some(s=>s.alive)&&tries<10);let s=soldier();if(s)s.move=95;angle=turn===0?-45:-135;power=60;wind=Math.round((rng()*2-1)*30)/10;updateHud();scheduleAI();processRemote()}
function setWeapon(w){weapon=w;document.querySelectorAll('.weapon').forEach(b=>b.classList.toggle('active',b.dataset.w===w))}weaponsEl.innerHTML=weaponList.map(w=>`<button class="weapon ${w[1]==='cannon'?'active':''}" data-w="${w[1]}"><span class="key">${w[0]}</span><span><span class="dot" style="--w:${w[3]}"></span><span class="weapon-name">${w[2]}</span></span></button>`).join('');weaponsEl.onclick=e=>{let b=e.target.closest('.weapon');if(b)setWeapon(b.dataset.w)};
function shoot(post=true){if(post&&!canPlay())return;let s=soldier();if(!s)return;let r=angle*Math.PI/180,f=4+power*.13;proj={x:s.x+Math.cos(r)*18,y:s.y+Math.sin(r)*18,vx:Math.cos(r)*f,vy:Math.sin(r)*f,team:turn,w:weapon,life:360};if(post&&state.online)api('/api/game/action',{name:state.name,code:state.party,action:{type:'shot',team:turn,angle,power,weapon}}).then(j=>lastAction=j.id||lastAction).catch(()=>note('shot not sent','#ff9b80'))}
function crater(cx,cy,rad){for(let x=Math.max(0,cx-rad|0);x<Math.min(world.w,cx+rad|0);x++){let d=x-cx,dep=Math.sqrt(Math.max(0,rad*rad-d*d))/(hard[x]||1);if(terrain[x]<cy+dep)terrain[x]=Math.min(world.h+40,cy+dep)}}
function blast(x,y,rad,dmg,w,team,cut=true){if(cut)crater(x,y,rad);parts.push({x,y,r:8,a:1,c:colorFor(w)});teams.forEach(t=>t.soldiers.forEach(s=>{if(!s.alive)return;let d=Math.hypot(s.x-x,s.y-y);if(d<rad+24){if(dmg&&t.id!==team){s.hp-=Math.round(Math.max(8,(1-d/(rad+24))*dmg));if(s.hp<=0)s.alive=false}s.vx+=((s.x-x)/Math.max(d,1))*(w==='lift'?3:5);s.vy-=w==='lift'?10:5.5}}))}
function colorFor(w){return({cannon:'#f2ce64',lift:'#74d7ff',fire:'#ff7548',cluster:'#b8ff5a',drill:'#d7c0ff'})[w]||'#f2ce64'}
function explode(x,y){let w=proj?.w||'cannon',tm=proj?.team||0;if(w==='lift')blast(x,y,42,0,w,tm,false);else if(w==='fire'){blast(x,y,48,36,w,tm,true);fires.push({x,y,r:70,team:tm,life:1})}else if(w==='cluster'){blast(x,y,34,28,w,tm,true);for(let i=0;i<4;i++)setTimeout(()=>blast(x+(rng()-.5)*96,y+rng()*40,27,26,w,tm,true),80+i*65)}else if(w==='drill'){for(let xx=x-20;xx<x+20;xx++){let ix=Math.max(0,Math.min(world.w-1,xx|0));terrain[ix]=Math.min(world.h+40,Math.max(terrain[ix],y+120-Math.abs(xx-x)*3))}blast(x,y,30,20,w,tm,false)}else blast(x,y,52,76,w,tm,true);items.forEach(it=>{if(it.alive&&w!=='lift'&&Math.hypot(it.x-x,it.y-y)<70){it.alive=false;setTimeout(()=>{let old=proj;proj={w:'cannon',team:tm};explode(it.x,it.y);proj=old},70)}});proj=null;updateHud();setTimeout(nextTurn,850)}
function scheduleAI(){clearTimeout(aiTimer);let t=teams[turn];if(!t||t.type!=='ai'||!game)return;aiTimer=setTimeout(()=>{let me=soldier(),targets=teams.flatMap((tm,i)=>i===turn?[]:tm.soldiers.filter(s=>s.alive));if(!me||!targets.length)return;let tar=targets.sort((a,b)=>Math.hypot(a.x-me.x,a.y-me.y)-Math.hypot(b.x-me.x,b.y-me.y))[0];let spread=(6-state.ai)*14+5;angle=Math.atan2(tar.y-me.y-90-rng()*spread,tar.x-me.x)*180/Math.PI+(rng()-.5)*spread;power=Math.max(34,Math.min(95,Math.abs(tar.x-me.x)/11+35+rng()*spread));setWeapon(['cannon','fire','cluster','drill'][Math.floor(rng()*4)]);updateHud();setTimeout(()=>shoot(false),450)},850)}
function move(dir,dt=.016){if(!canPlay())return;let s=soldier();if(!s||s.move<=0)return;let step=Math.min(175*dt,s.move);s.x=Math.max(18,Math.min(world.w-18,s.x+dir*step));let g=terrainY(s.x)-s.r;s.y=Math.min(s.y+(g-s.y)*.35,g);s.move-=step;s.step=(s.step||0)+step*.28;updateHud()}
function update(dt=.016){if(keys.left!==keys.right)move(keys.left?-1:1,dt);items.forEach(it=>{if(!it.alive)return;it.vy+=.16;it.y+=it.vy;let g=terrainY(it.x)-14;if(it.y>g){it.y=g;it.vy=0}});teams.forEach(t=>t.soldiers.forEach(s=>{if(!s.alive)return;s.vy+=.18;s.x+=s.vx;s.y+=s.vy;s.vx*=.9;if(s.x<18){s.x=18;s.vx=Math.abs(s.vx)*.3}if(s.x>world.w-18){s.x=world.w-18;s.vx=-Math.abs(s.vx)*.3}let g=terrainY(s.x)-s.r;if(s.y>g){s.y=g;s.vy=0}if(s.y>world.h+80)s.alive=false}));if(proj){proj.vx+=wind*.005;proj.vy+=.14;proj.x+=proj.vx;proj.y+=proj.vy;proj.life--;if(proj.x<0||proj.x>world.w){proj.x=Math.max(0,Math.min(world.w,proj.x));explode(proj.x,proj.y)}else if(proj.y>world.h||proj.life<0)explode(proj.x,Math.min(proj.y,terrainY(proj.x)));else if(proj.y>=terrainY(proj.x))explode(proj.x,proj.y);else for(let t of teams)for(let s of t.soldiers)if(s.alive&&Math.hypot(s.x-proj.x,s.y-proj.y)<16){explode(proj.x,proj.y);return}}parts=parts.filter(p=>{p.r+=3;p.a-=.035;return p.a>0})}
function sky(){let night=state.map==='night'||state.map==='moon',g=ctx.createLinearGradient(0,0,0,world.h);if(night){g.addColorStop(0,'#081229');g.addColorStop(.58,'#1e3d76');g.addColorStop(1,'#9aa7b8')}else if(state.map==='ember'){g.addColorStop(0,'#442032');g.addColorStop(.55,'#d56f50');g.addColorStop(1,'#ffc977')}else{g.addColorStop(0,'#4597ec');g.addColorStop(.55,'#a7d6ef');g.addColorStop(1,'#f5d58b')}ctx.fillStyle=g;ctx.fillRect(0,0,world.w,world.h);ctx.fillStyle=night?'#ffffffaa':'#ffffff88';for(let i=0;i<36;i++){let x=(i*97+50)%world.w,y=40+(i*37)%180;ctx.fillRect(x,y,night?3:8,night?3:4)}}
function drawTerrain(){ctx.beginPath();ctx.moveTo(0,world.h);for(let x=0;x<world.w;x++)ctx.lineTo(x,terrain[x]);ctx.lineTo(world.w,world.h);ctx.closePath();let g=ctx.createLinearGradient(0,330,0,world.h);if(state.map==='moon'){g.addColorStop(0,'#e3e5dd');g.addColorStop(.12,'#aeb5b8');g.addColorStop(1,'#4f5b68')}else if(state.map==='night'){g.addColorStop(0,'#7f91b8');g.addColorStop(.12,'#394a67');g.addColorStop(1,'#151d2d')}else if(state.map==='ember'){g.addColorStop(0,'#543c3c');g.addColorStop(.12,'#8d4433');g.addColorStop(1,'#261313')}else{g.addColorStop(0,'#83b961');g.addColorStop(.12,'#477c44');g.addColorStop(1,'#3a281d')}ctx.fillStyle=g;ctx.fill();ctx.save();ctx.clip();let speck=state.map==='moon'?'#f8f6dc':state.map==='ember'?'#ffb069':state.map==='night'?'#aab8dd':'#d5eba1',shade=state.map==='moon'?'#6e7781':state.map==='ember'?'#3a1d1a':state.map==='night'?'#1b2741':'#294120';ctx.globalAlpha=.34;ctx.lineWidth=2;for(let x=0;x<world.w;x+=28){let y=terrainY(x)+18+(x*13%110);ctx.strokeStyle=x%56?shade:speck;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+34,y+Math.sin(x*.04)*8);ctx.stroke()}ctx.globalAlpha=.42;for(let i=0;i<190;i++){let x=(i*67+23)%world.w,y=terrainY(x)+10+(i*29%230);ctx.fillStyle=i%3?speck:shade;ctx.fillRect(x,y,2+i%4,2+i%3)}ctx.globalAlpha=.18;for(let x=0;x<world.w;x+=70){ctx.fillStyle=shade;ctx.beginPath();ctx.ellipse(x+20,terrainY(x)+70+(x%180),18+(x%5)*3,7,0,0,Math.PI*2);ctx.fill()}ctx.restore();ctx.strokeStyle=state.map==='moon'?'#f2f2e6':'#cce28c';ctx.lineWidth=5;ctx.beginPath();for(let x=0;x<world.w;x+=2)x?ctx.lineTo(x,terrain[x]):ctx.moveTo(x,terrain[x]);ctx.stroke();ctx.strokeStyle='#ffffff44';ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,world.h);ctx.moveTo(world.w,0);ctx.lineTo(world.w,world.h);ctx.stroke()}
function drawChar(s,t,active){if(!s.alive)return;let stride=Math.sin(s.step||0)*3,bob=Math.abs(Math.sin(s.step||0))*2;ctx.save();ctx.translate(s.x,s.y-bob);ctx.fillStyle='#0004';ctx.beginPath();ctx.ellipse(0,15+bob,18,6,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=t.color;ctx.strokeStyle=t.dark;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,-4,s.r,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#fff4dc';ctx.fillRect(-5,-8,3,3);ctx.fillRect(4,-8,3,3);ctx.fillStyle=t.dark;ctx.fillRect(-13-stride,9,10,8);ctx.fillRect(3+stride,9,10,8);if(active){ctx.strokeStyle='#fff7cf';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,-4,21+Math.sin((s.step||0)*.7)*1.5,0,Math.PI*2);ctx.stroke()}ctx.restore();ctx.fillStyle='#111a';ctx.fillRect(s.x-20,s.y-38,40,6);ctx.fillStyle=s.hp>45?'#44d87a':'#ff6759';ctx.fillRect(s.x-20,s.y-38,40*(s.hp/100),6)}
function draw(){ctx.clearRect(0,0,innerWidth,innerHeight);ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);sky();drawTerrain();fires.forEach(f=>{ctx.fillStyle='#ff744955';ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fill()});if(game&&!proj){let s=soldier();if(s){let r=angle*Math.PI/180;ctx.strokeStyle='#fff7cfcc';ctx.setLineDash([8,7]);ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+Math.cos(r)*(40+power),s.y+Math.sin(r)*(40+power));ctx.stroke();ctx.setLineDash([])}}teams.forEach((t,ti)=>t.soldiers.forEach((s,si)=>drawChar(s,t,ti===turn&&si===active[turn]%t.soldiers.length)));items.forEach(it=>{if(it.alive){ctx.fillStyle='#e1473d';ctx.fillRect(it.x-11,it.y-14,22,28);ctx.fillStyle='#ffd15a';ctx.fillRect(it.x-6,it.y-4,12,4)}});if(proj){ctx.fillStyle=colorFor(proj.w);ctx.beginPath();ctx.arc(proj.x,proj.y,6,0,Math.PI*2);ctx.fill()}parts.forEach(p=>{ctx.globalAlpha=p.a;ctx.strokeStyle=p.c;ctx.lineWidth=5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1});ctx.restore()}
function loop(t=0){let dt=Math.min(.034,(t-lastT)/1000||.016);lastT=t;update(dt);draw();requestAnimationFrame(loop)}
canvas.onpointerdown=e=>{if(!canPlay())return;drag=true;aim(e)};canvas.onpointermove=e=>{if(drag)aim(e)};onpointerup=()=>{if(drag){drag=false;shoot()}};function aim(e){let s=soldier(),p=toWorld(e);if(!s)return;angle=Math.atan2(p.y-s.y,p.x-s.x)*180/Math.PI;power=Math.max(18,Math.min(100,Math.hypot(p.x-s.x,p.y-s.y)/2));updateHud()}
function typing(e){let t=e.target;return t&&(['INPUT','TEXTAREA','SELECT'].includes(t.tagName)||t.isContentEditable)}
onkeydown=e=>{if(typing(e))return;let k=e.key.toLowerCase();if(k==='a'||e.key==='ArrowLeft'){keys.left=true;e.preventDefault()}if(k==='d'||e.key==='ArrowRight'){keys.right=true;e.preventDefault()}if(e.key==='ArrowUp'){power=Math.min(100,power+4);e.preventDefault()}if(e.key==='ArrowDown'){power=Math.max(18,power-4);e.preventDefault()}if(e.code==='Space'&&!e.repeat){e.preventDefault();shoot()}let w=weaponList.find(x=>x[0]===e.key);if(w)setWeapon(w[1]);updateHud()};
onkeyup=e=>{let k=e.key.toLowerCase();if(k==='a'||e.key==='ArrowLeft')keys.left=false;if(k==='d'||e.key==='ArrowRight')keys.right=false};
function refreshPlayer(){document.getElementById('playerName').textContent=state.name||'Guest';document.getElementById('readyText').textContent=state.name?'Ready':'Not Ready'}
function setParty(p){state.party=p.code;state.members=p.members||[];document.getElementById('partyCode').textContent=state.party;document.getElementById('inviteLink').value=location.origin+location.pathname+'?server='+encodeURIComponent(state.server)+'&party='+state.party;note('Party Ready: '+state.party,'#fff7cf');showStep('stepMode');setMode(state.mode);refreshPlayer()}
async function poll(){if(!state.party)return;try{let j=await apiGet('/api/party?code='+state.party+'&name='+encodeURIComponent(state.name));if(j.party){state.members=j.party.members||state.members;if(j.party.game&&j.party.game.id!==state.gameId){state.gameId=j.party.game.id;state.seed=j.party.game.seed;Object.assign(state,j.party.game.config||{});startMatch(true,true)}(j.party.game?.actions||[]).forEach(a=>{if(a.id>lastAction&&a.name!==state.name){lastAction=a.id;if(a.type==='shot'){turn=a.team;angle=a.angle;power=a.power;setWeapon(a.weapon);shoot(false)}}})}}catch{}}
setInterval(poll,1800);
addEventListener('click',e=>{let b=e.target.closest('.choice,.weapon,.resign');if(!b)return;b.classList.remove('bump');void b.offsetWidth;b.classList.add('bump')});
function setMode(m){state.mode=m;$('teamMode').classList.toggle('selected',m==='team');$('versusMode').classList.toggle('selected',m==='versus');$('playHint').textContent=m==='team'?'Start Team Match':'Start Player Fight'}
function doResign(){if(!game)return;game=false;keys.left=keys.right=false;clearTimeout(aiTimer);proj=null;$('resignConfirm').classList.remove('show');$('resignBtn').classList.remove('show');let mine=teams.find(t=>!state.online?t.id===0:state.mode==='team'?t.id===0:t.owner===state.name);if(mine)mine.soldiers.forEach(s=>s.alive=false);winner.textContent='Game Over';winnerText.textContent='You Raised The White Flag.';overlay.classList.add('show');updateHud()}
document.getElementById('soloBtn').onclick=()=>{state.name=state.name||'Guest'+Math.floor(Math.random()*9999);state.party='';state.members=[];refreshPlayer();startMatch(false,false)};document.getElementById('guestSoloBtn').onclick=()=>{state.name=state.name||'Guest'+Math.floor(Math.random()*9999);state.party='';state.members=[];refreshPlayer();startMatch(false,false)};document.getElementById('accountBtn').onclick=()=>showStep('stepAccount');document.getElementById('guestBtn').onclick=()=>{state.name='Guest'+Math.floor(Math.random()*9999);refreshPlayer();showStep('stepParty')};document.getElementById('finishName').onclick=async()=>{let n=document.getElementById('nameInput').value.trim().replace(/[^a-z0-9_-]/gi,'').slice(0,18);if(!n)return;state.name=n;localStorage.hillName=n;try{await api('/api/account',{name:n})}catch{}refreshPlayer();showStep('stepParty')};document.getElementById('makeParty').onclick=async()=>{try{setParty((await api('/api/party/create',{name:state.name})).party)}catch{note('Server Not Reachable. Start Or Deploy The Hillshot Server.','#ff9b80')}};document.getElementById('joinParty').onclick=async()=>{let code=document.getElementById('joinCode').value.trim().toUpperCase();if(!code)return;try{setParty((await api('/api/party/join',{name:state.name,code})).party)}catch{note('Party Not Found, Full, Or Server Offline.','#ff9b80')}};document.getElementById('teamMode').onclick=()=>{setMode('team');note('Team Mode Selected')};document.getElementById('versusMode').onclick=()=>{setMode('versus');note('Fight Mode Selected')};document.getElementById('playBtn').onclick=()=>startMatch(!!state.party,false);document.getElementById('settingsBtn').onclick=()=>showStep('stepSettings');document.getElementById('backSettings').onclick=()=>showStep(state.party?'stepMode':'stepStart');document.getElementById('mapSelect').onchange=e=>{state.map=e.target.value;makeTerrain()};document.getElementById('aiLevel').oninput=e=>state.ai=Number(e.target.value);document.getElementById('againBtn').onclick=()=>startMatch(!!state.party,false);document.getElementById('menuBtn').onclick=()=>{overlay.classList.remove('show');$('resignBtn').classList.remove('show');menu.classList.remove('hide')};document.getElementById('resignBtn').onclick=()=>{if(game)$('resignConfirm').classList.add('show')};document.getElementById('noResign').onclick=()=>$('resignConfirm').classList.remove('show');document.getElementById('yesResign').onclick=doResign;setMode(state.mode);
let params=new URLSearchParams(location.search);if(params.get('server')){state.server=params.get('server');localStorage.hillServer=state.server}if(params.get('party')){state.party=params.get('party').toUpperCase();document.getElementById('joinCode').value=state.party}refreshPlayer();makeTerrain();loop();
